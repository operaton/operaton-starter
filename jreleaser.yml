project:
  name: operaton-starter
  description: Operaton project starter — generates ready-to-run Operaton process projects
  longDescription: |
    operaton-starter generates ready-to-run Operaton BPM process projects via a web UI, REST API,
    CLI, and MCP tool. Supports Maven, Gradle (Groovy DSL), and Gradle (Kotlin DSL) build systems.
  links:
    homepage: https://github.com/operaton/operaton-starter
  authors:
    - Operaton Contributors
  license: Apache-2.0
  inceptionYear: "2026"
  languages:
    java:
      groupId: org.operaton.starter
      artifactId: starter-server
      mainClass: org.operaton.dev.starter.server.StarterServerApplication
      version: 21
release:
  github:
    overwrite: true
    sign: false
    owner: operaton
    name: operaton-starter
    draft: false
    skipTag: false
    releaseName: '{{tagName}}'
    prerelease:
      enabled: true
    issues:
      enabled: true
      comment: '🎉 This issue has been resolved in `{{tagName}}` ([Release Notes]({{releaseNotesUrl}}))'
      applyMilestone: ALWAYS
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      enabled: true
      sort: ASC
      links: true
      skipMergeCommits: true
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'
      labelers:
        - label: feature
          title: 'feat'
        - label: fix
          title: 'fix'
        - label: docs
          title: 'docs'
        - label: chore
          title: 'chore'
      categories:
        - title: '🐛 Bug Fixes'
          labels:
            - fix
        - title: '🔧 Maintenance'
          labels:
            - chore
      hide:
        contributors:
          - 'Claude Sonnet 4.6'
          - 'Copilot'
          - 'Copilot Autofix powered by AI'
          - 'GitHub'
checksum:
  algorithms:
    - SHA_256

signing:
  active: NEVER
  pgp:
    armored: true

distributions:
  operaton-starter:
    type: SINGLE_JAR
    artifacts:
      - path: 'starter-server/target/starter-server-{{projectVersion}}.jar'
    java:
      groupId: org.operaton.starter
      artifactId: starter-server
      mainClass: org.operaton.dev.starter.server.StarterServerApplication

packagers:
  docker:
    active: ALWAYS
    commitAuthor:
      email: jreleaser@operaton.org
    registries:
      - serverName: DEFAULT
        username: '{{env.DOCKERHUB_USERNAME}}'
        password: '{{env.DOCKERHUB_TOKEN}}'
    buildx:
      enabled: true
      createBuilder: true
      platforms:
        - linux/amd64
        - linux/arm64
    imageNames:
      - "operaton/operaton-starter:{{tagName}}"
      - "operaton/operaton-starter:v{{projectVersionMajor}}"
      - "operaton/operaton-starter:v{{projectVersionMajor}}.{{projectVersionMinor}}"
      - "operaton/operaton-starter:latest"


announce:
  # Announcement channels (configure as needed)
  active: NEVER
