spring.application.name=operaton-starter
server.port=8080
management.endpoints.web.exposure.include=health,info

# Self-hosting defaults — override via environment variables (Spring relaxed binding)
# STARTER_DEFAULTS_GROUP_ID        → starter.defaults.group-id        (default: com.example)
# STARTER_DEFAULTS_MAVEN_REGISTRY  → starter.defaults.maven-registry  (default: Maven Central)
# STARTER_DEFAULTS_OPERATON_VERSION → starter.defaults.operaton-version (default: BOM version)
# STARTER_CORS_ALLOWED_ORIGINS     → starter.cors.allowed-origins     (default: start.operaton.org)
# Legacy env aliases are still supported for compatibility with existing docs and deployments:
# DEFAULT_GROUP_ID, MAVEN_REGISTRY, OPERATON_VERSION, CORS_ALLOWED_ORIGINS
starter.defaults.group-id=${STARTER_DEFAULTS_GROUP_ID:${DEFAULT_GROUP_ID:com.example}}
starter.defaults.maven-registry=${STARTER_DEFAULTS_MAVEN_REGISTRY:${MAVEN_REGISTRY:}}
starter.defaults.operaton-version=${STARTER_DEFAULTS_OPERATON_VERSION:${OPERATON_VERSION:}}
starter.cors.allowed-origins=${STARTER_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:https://start.operaton.org,http://localhost:5173,http://localhost:8080}}
