version: "3.9"

# Development docker-compose for Operaton Starter
# Build the fat JAR first: ./mvnw verify -pl starter-templates,starter-server -am
# Then: docker compose -f docker-compose.dev.yml up

services:
  starter-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Self-hosting defaults (all optional — service works with no env vars)
      - STARTER_DEFAULTS_GROUP_ID=com.example
      # - STARTER_DEFAULTS_MAVEN_REGISTRY=https://nexus.example.com/repository/maven-public
      # - STARTER_DEFAULTS_OPERATON_VERSION=2.0.0
      # - STARTER_CORS_ALLOWED_ORIGINS=https://start.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
