version: "3.9"

# Development docker-compose for Operaton Starter
# Runs the starter-server locally with live reload support

services:
  starter-server:
    build:
      context: .
      dockerfile: starter-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DEFAULT_GROUP_ID=com.example
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
