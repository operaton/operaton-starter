name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: JReleaser Full Release
    runs-on: ubuntu-latest
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build and publish Maven artifacts
        run: mvn -Prelease deploy -pl starter-templates,starter-archetypes,starter-server,starter-web -am --batch-mode

      - name: Sync npm package versions to the release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (
            cd starter-mcp
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          )
          (
            cd starter-cli
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          )

      - name: Build Docker image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build -t operaton/operaton-starter:"$VERSION" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pack starter-mcp
        run: npm ci && npm run build && npm pack
        working-directory: starter-mcp

      - name: Pack starter-cli
        run: npm ci && npm run build && npm pack
        working-directory: starter-cli

      - name: Run JReleaser full-release
        uses: jreleaser/run-jreleaser-action@v2
        with:
          version: latest
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_NEXUS2_MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_NEXUS2_MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          JRELEASER_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
