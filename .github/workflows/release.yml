name: Release

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: 'The next development version to set (without -SNAPSHOT suffix). Leave empty to auto-compute based on branch.'
        required: false
        default: ''
      preliminary_release_qualifier:
        description: 'Optional preliminary release qualifier. Must match M[0-9], RC[0-9] or SNAPSHOT.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-Run: Skips remote operations when true'
        type: boolean
        required: true
        default: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      next_version: ${{steps.version.outputs.next_version}}
      version: ${{steps.version.outputs.version}}
      base_version: ${{steps.version.outputs.base_version}}
      is_prerelease: ${{steps.version.outputs.is_prerelease}}
    steps:
      - name: Check out the code
        uses: actions/checkout@v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compute next development version
        id: version
        run: |
          INPUT_VERSION="${{github.event.inputs.next_version}}"
          BRANCH_NAME="${{github.ref_name}}"

          if [ -n "$INPUT_VERSION" ]; then
            # Use the provided version
            echo "next_version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "Using provided next version: $INPUT_VERSION"
          else
            # Compute version based on branch
            CURRENT_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | tail -n 1 | sed -e 's/-SNAPSHOT//')
            if [ -z "$CURRENT_VERSION" ]; then
              echo "::error::Failed to retrieve current version from pom.xml"
              exit 1
            fi
            echo "Current version (without -SNAPSHOT): $CURRENT_VERSION"

            if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              SUFFIX="${BASH_REMATCH[4]}"

              if [ "$BRANCH_NAME" == "main" ]; then
                # main branch: increment minor, set patch to 0
                NEXT_MINOR=$((MINOR + 1))
                COMPUTED_VERSION="${MAJOR}.${NEXT_MINOR}.0${SUFFIX}"
                echo "Branch 'main': incrementing minor version"
              elif [[ "$BRANCH_NAME" =~ ^release/ ]]; then
                # release/* branches: increment patch
                NEXT_PATCH=$((PATCH + 1))
                COMPUTED_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}${SUFFIX}"
                echo "Branch '$BRANCH_NAME': incrementing patch version"
              else
                echo "::error::Cannot auto-compute next version for branch '$BRANCH_NAME'. Please provide the next_version input explicitly."
                exit 1
              fi

              echo "next_version=$COMPUTED_VERSION" >> $GITHUB_OUTPUT
              echo "Computed next version: $COMPUTED_VERSION"
            else
              echo "::error::Unable to parse current version '$CURRENT_VERSION'. Please provide the next_version input explicitly."
              exit 1
            fi
          fi
          BASE_RELEASE_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | tail -n 1 | sed -e 's/-SNAPSHOT//')
          QUALIFIER="${{github.event.inputs.preliminary_release_qualifier}}"
          if [ -n "$QUALIFIER" ]; then
            if [[ ! "$QUALIFIER" =~ ^(M[0-9]|RC[0-9]|SNAPSHOT)$ ]]; then
              echo "::error::Preliminary Release Qualifier '$QUALIFIER' must match M[0-9], RC[0-9] or SNAPSHOT."
              exit 1
            fi
            if [[ ! "$BASE_RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.0$ ]]; then
              echo "::error::Preliminary Release Qualifier can only be used for .0 versions. Current version is '$BASE_RELEASE_VERSION'."
              exit 1
            fi
            RELEASE_VERSION="${BASE_RELEASE_VERSION}-${QUALIFIER}"
            echo "⚙ Releasing version '$RELEASE_VERSION' (Preliminary Release)"
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            RELEASE_VERSION="$BASE_RELEASE_VERSION"
            echo "⚙ Releasing version '$RELEASE_VERSION'"
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_RELEASE_VERSION" >> $GITHUB_OUTPUT


  release:
    name: Perform Release
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Check out the code
        uses: actions/checkout@v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set version
        id: set-version
        shell: bash
        run: .github/scripts/set-project-version.sh ${{needs.prepare.outputs.version}}

      - name: Maven Build
        run: |
          ./mvnw deploy
          find target -name maven-metadata.* -delete

      - name: Commit changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        if: ${{github.event.inputs.dry_run == 'false' }}
        with:
          message: "chore(release) Releasing version ${{steps.version.outputs.version}}"

      - name: Release with JReleaser
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v2.5.0
        env:
          JRELEASER_PROJECT_VERSION: ${{needs.prepare.outputs.version}}
          JRELEASER_DRY_RUN: ${{github.event.inputs.dry_run}}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PUBLIC_KEY: ${{secrets.GPG_PUBLIC_KEY}}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties

  post_release:
    name: Post-Release
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the code
        uses: actions/checkout@v7.0.0

      - name: Update the release branch
        run: |
          git pull

      - name: Delete snapshot release
        if: ${{github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SNAPSHOT_TAGS=(
            "${{ needs.release_build.outputs.version }}-SNAPSHOT"
            "v${{ needs.release_build.outputs.version }}-SNAPSHOT"
          )

          for SNAPSHOT_TAG in "${SNAPSHOT_TAGS[@]}"; do
            echo "Attempting to delete snapshot release: $SNAPSHOT_TAG"

            if gh release view "$SNAPSHOT_TAG" > /dev/null 2>&1; then
              echo "Found snapshot release $SNAPSHOT_TAG, deleting..."
              gh release delete "$SNAPSHOT_TAG" --yes --cleanup-tag
              echo "Successfully deleted snapshot release $SNAPSHOT_TAG"
            else
              echo "Snapshot release $SNAPSHOT_TAG not found, skipping deletion"
            fi
          done

      - name: Set next development version
        id: set-next-version
        run: |
          if [ -n "${{github.event.inputs.preliminary_release_qualifier}}" ]; then
            NEXT_VERSION=${{needs.release_build.outputs.base_version}}-SNAPSHOT
          else
            NEXT_VERSION=${{needs.prepare.outputs.next_version}}-SNAPSHOT
          fi
          .github/scripts/set-project-version.sh $NEXT_VERSION
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Commit changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        if: ${{github.event.inputs.dry_run == 'false' }}
        with:
          message: "[releng] Bump version to ${{steps.set-next-version.outputs.next_version}}"
          pull: '--rebase --autostash'
        continue-on-error: true
